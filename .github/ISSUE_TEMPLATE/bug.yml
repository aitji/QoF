name: Bug Report
description: Report a bug or broken behavior in QoF
title: "[bug] "
labels: [ "bug" ]
assignees:
  - aitji

body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Found something broken in QoF? Help us fix it by filling out the details below.

  - type: input
    id: summary
    attributes:
      label: Short Description
      description: One-line summary of the bug
      placeholder: "X modules crashes the game when..."
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: QoF Version
      description: Which version of QoF are you using?
      placeholder: "e.g. v1.1.0"
    validations:
      required: true

  - type: input
    id: mc_version
    attributes:
      label: Minecraft Bedrock Version
      description: Which version of Bedrock are you on?
      placeholder: "e.g. 26.14"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: What device are you playing on?
      options:
        - Windows (PC)
        - Android
        - iOS
        - iPadOS
        - Xbox
        - PlayStation
        - Nintendo Switch
        - Other
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which part of QoF is affected?
      options:
        - Other
        - Modules
        - Blocks
        - Items
        - Recipes
        - Commands
        - Compatibility Issue
        - Mobs / Entities
        - Installation / Setup
        - I Don't Know
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How badly does this affect gameplay?
      options:
        - Critical, Game crash / world corruption
        - High, Major feature completely broken
        - Medium, Feature works but behaves incorrectly
        - Low, Minor / visual issue
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      description: How often does this happen?
      options:
        - Always (100%)
        - Often (> 50%)
        - Sometimes (< 50%)
        - Rarely (once or twice)
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to trigger the bug in-game
      value: |
        1. Load a Bedrock world with Beta APIs enabled
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
      placeholder: "The modules should..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "Instead, the modules..."
    validations:
      required: true

  - type: checkboxes
    id: addons
    attributes:
      label: Other Addons Active?
      description: Were any other addons loaded alongside QoF? (optional)
      options:
        - label: "Yes, I will listed them in Additional Notes below"
        - label: No, QoF was the only addon loaded

  - type: textarea
    id: logs
    attributes:
      label: Error Logs / Content Log
      description: Paste output from Minecraft's content log if available (Settings ->
        Creator -> Enable Content Log) (optional)
      placeholder: "[error][addon] ..."
      value: "https://aitji.is-a.dev/support#how-to-enabled-addon-error-log"
      render: bash

  - type: upload
    id: screenshots
    attributes:
      label: Screenshots / Clips
      description: In-game screenshots or recordings of the bug (optional)
    validations:
      required: false
      accept: ".png,.jpg,.jpeg,.gif,.webp,.mp4,.mov,.webm"

  - type: checkboxes
    id: checklist
    attributes:
      label: Before Submitting
      options:
        - label: I searched existing issues and this hasn't been reported before
          required: true
        - label: I tested with only QoF active to rule out conflicts
        - label: I included steps that reliably reproduce the bug

  - type: textarea
    id: extra
    attributes:
      label: Additional Notes
      description: Other addons active, world settings, anything else relevant (optional)
