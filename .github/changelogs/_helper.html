<!DOCTYPE html>
<html>

<body>
    <p>drag file here (perfer: manifest.json)</p>
    <pre id="out"></pre>

    <script>
        const out = document.getElementById("out")

        document.addEventListener("dragover", e => e.preventDefault())
        document.addEventListener("drop", e => {
            e.preventDefault()

            const f = e.dataTransfer.files[0]
            if (!f) return

            const d = new Date(f.lastModified)
            const unix = Math.floor(d.getTime() / 1000)

            const mon = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"]
            const txt = `Release Date: [${mon[d.getUTCMonth()]}/${String(d.getUTCDate()).padStart(2, "0")}/${d.getUTCFullYear()} (${String(d.getUTCHours()).padStart(2, "0")}:${String(d.getUTCMinutes()).padStart(2, "0")}:${String(d.getUTCSeconds()).padStart(2, "0")})](https://time.is/Unix_time_converter/${unix})`
            out.textContent = txt
        })
    </script>
</body>

</html>
